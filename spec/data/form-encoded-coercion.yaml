openapi: 3.0.3
info:
  title: Form-encoded coercion test
  version: '1.0'
paths:
  /form-encoded:
    post:
      operationId: submitFormEncoded
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - name
                - count
              properties:
                name:
                  type: string
                count:
                  type: integer
                price:
                  type: number
                active:
                    type: boolean
                tags:
                  type: array
                  items:
                    type: integer
      responses:
        '200':
          description: OK
