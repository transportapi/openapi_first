openapi: 3.0.3
info:
  title: Plain text constrained test
  version: '1.0'
paths:
  /status:
    get:
      operationId: getStatus
      responses:
        '200':
          description: A status code
          content:
            text/plain:
              schema:
                type: string
                minLength: 3
                maxLength: 10
                pattern: '^[A-Z]+$'
